name: Deploy

# CI 部署到 Cloudflare Pages(不走 Pages 的 git 连接 —— 构建在此做对、显式可控)。
# 需要 org/repo secret:CLOUDFLARE_API_TOKEN(Pages:Edit)+ CF_ACCOUNT_ID。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install + build (Astro → dist/)
        run: |
          npm ci || npm install
          npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy dist --project-name aglet-site --branch main
